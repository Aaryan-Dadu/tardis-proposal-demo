name: tardis-proposal-prototype-dev-only-ci

on:
  push:
    branches:
      - dev-only-ci

defaults:
  run:
    shell: bash -l {0}

permissions:
  contents: write

jobs:
  ci-direct-execution:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: tardis-proposal-prototype-ci
          environment-file: envs/ci-environment.yml
          auto-activate-base: false

      - name: Resolve diff refs
        id: diffrefs
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "base_ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "head_ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base_ref=origin/main" >> "$GITHUB_OUTPUT"
            echo "head_ref=HEAD" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect changed configs
        run: |
          python scripts/detect_changed_configs.py \
            --base-ref "${{ steps.diffrefs.outputs.base_ref }}" \
            --head-ref "${{ steps.diffrefs.outputs.head_ref }}" \
            --output generated/changed-configs.json

      - name: Check if config changes exist
        id: configcheck
        run: |
          count="$(jq -r '.count // 0' generated/changed-configs.json)"
          if [[ "$count" -gt 0 ]]; then
            echo "has_configs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_configs=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Changed configs: $count"

      - name: Generate per-config setup.yaml
        if: steps.configcheck.outputs.has_configs == 'true'
        run: python scripts/generate_setup_yamls.py

      - name: Commit and push generated setup.yaml files
        if: success() && steps.configcheck.outputs.has_configs == 'true'
        run: |
          set +e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p generated
          if [[ -f generated/setup-generation-manifest.json ]]; then
            jq -r '.[] | .setup_yaml // empty' generated/setup-generation-manifest.json \
              | sed '/^$/d' \
              | sort -u > generated/setup-yaml-paths.txt
          else
            : > generated/setup-yaml-paths.txt
          fi

          if [[ -s generated/setup-yaml-paths.txt ]]; then
            existing_count="$(while IFS= read -r path; do [[ -f "$path" ]] && echo "$path"; done < generated/setup-yaml-paths.txt | wc -l)"
          else
            existing_count=0
          fi
          echo "setup_yaml candidates: $existing_count"

          if [[ ! -s generated/setup-yaml-paths.txt ]]; then
            echo "No setup.yaml paths found in manifest."
            exit 0
          fi

          while IFS= read -r path; do
            [[ -n "$path" ]] || continue
            [[ -f "$path" ]] || continue
            git add -- "$path"
          done < generated/setup-yaml-paths.txt

          if [[ -z "$(git diff --cached --name-only)" ]]; then
            echo "No setup.yaml changes to commit."
            exit 0
          fi
          git commit -m "Update generated setup.yaml files [skip ci]"
          commit_rc=$?
          if [[ $commit_rc -ne 0 ]]; then
            echo "setup.yaml commit skipped/failed (rc=$commit_rc), continuing CI."
            exit 0
          fi

          git push
          push_rc=$?
          if [[ $push_rc -ne 0 ]]; then
            echo "setup.yaml push failed (rc=$push_rc), continuing CI."
            exit 0
          fi

      - name: Run full notebook generation for all changed configs
        if: steps.configcheck.outputs.has_configs == 'true'
        run: python scripts/run_full_notebook_generation.py

      - name: Build gallery from generated notebooks
        if: github.ref == 'refs/heads/main' && steps.configcheck.outputs.has_configs == 'true'
        run: python scripts/build_gallery.py --manifest out/notebook-manifest.json --output-dir docs-site

      - name: Commit and push generated notebooks
        if: success() && steps.configcheck.outputs.has_configs == 'true'
        run: |
          set +e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add out
          if git diff --cached --quiet; then
            echo "No generated output changes to commit."
            exit 0
          fi
          git commit -m "Update generated notebooks (dev-only-ci) [skip ci]"
          commit_rc=$?
          if [[ $commit_rc -ne 0 ]]; then
            echo "Notebook commit skipped/failed (rc=$commit_rc), continuing CI."
            exit 0
          fi

          git push
          push_rc=$?
          if [[ $push_rc -ne 0 ]]; then
            echo "Notebook push failed (rc=$push_rc), continuing CI."
            exit 0
          fi

      - name: Gallery deployment skipped on dev-only-ci
        if: success() && steps.configcheck.outputs.has_configs == 'true'
        run: echo "Gallery build/deploy is main-branch-only."

      - name: No config change skip notice
        if: steps.configcheck.outputs.has_configs != 'true'
        run: echo "No config changes detected. Skipping setup and notebook generation."

      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-only-ci-artifacts
          path: |
            generated/changed-configs.json
            generated/setup-generation-manifest.json
            out/
