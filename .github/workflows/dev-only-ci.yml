name: tardis-proposal-prototype-dev-only-ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - dev-only-ci

defaults:
  run:
    shell: bash -l {0}

permissions:
  contents: write

concurrency:
  group: dev-only-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-direct-execution:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: tardis-proposal-prototype-ci
          environment-file: envs/ci-environment.yml
          auto-activate-base: false

      - name: Resolve diff refs
        id: diffrefs
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "base_ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "head_ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base_ref=origin/main" >> "$GITHUB_OUTPUT"
            echo "head_ref=HEAD" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect changed configs
        run: |
          python scripts/detect_changed_configs.py \
            --base-ref "${{ steps.diffrefs.outputs.base_ref }}" \
            --head-ref "${{ steps.diffrefs.outputs.head_ref }}" \
            --output generated/changed-configs.json

      - name: Check if config changes exist
        id: configcheck
        run: |
          count="$(jq -r '.count // 0' generated/changed-configs.json)"
          if [[ "$count" -gt 0 ]]; then
            echo "has_configs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_configs=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Changed configs: $count"

      - name: Generate per-config setup.yaml
        if: steps.configcheck.outputs.has_configs == 'true'
        run: python scripts/generate_setup_yamls.py

      - name: Commit and push generated setup.yaml files
        if: success() && github.ref == 'refs/heads/dev-only-ci' && github.event_name != 'pull_request' && steps.configcheck.outputs.has_configs == 'true'
        run: |
          set +e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = Path("generated/setup-generation-manifest.json")
          selected: list[str] = []
          if manifest.exists():
              rows = json.loads(manifest.read_text(encoding="utf-8"))
              for row in rows:
                  path = row.get("setup_yaml") if isinstance(row, dict) else None
                  if isinstance(path, str) and path.strip() and Path(path).exists():
                      selected.append(path)

          out = Path("generated/setup-yaml-paths.txt")
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text("\n".join(sorted(set(selected))) + "\n", encoding="utf-8")
          print(f"setup_yaml candidates: {len(set(selected))}")
          PY

          if [[ ! -s generated/setup-yaml-paths.txt ]]; then
            echo "No setup.yaml paths found in manifest."
            exit 0
          fi

          while IFS= read -r path; do
            [[ -n "$path" ]] || continue
            git add -- "$path"
          done < generated/setup-yaml-paths.txt

          if [[ -z "$(git diff --cached --name-only)" ]]; then
            echo "No setup.yaml changes to commit."
            exit 0
          fi
          git commit -m "Update generated setup.yaml files [skip ci]"
          commit_rc=$?
          if [[ $commit_rc -ne 0 ]]; then
            echo "setup.yaml commit skipped/failed (rc=$commit_rc), continuing CI."
            exit 0
          fi

          branch_name="${GITHUB_REF#refs/heads/}"
          pushed="false"
          for attempt in 1 2 3; do
            if git push; then
              pushed="true"
              break
            fi
            echo "setup.yaml push failed on attempt $attempt, rebasing on origin/$branch_name and retrying..."
            git fetch origin "$branch_name"
            if ! git rebase "origin/$branch_name"; then
              echo "setup.yaml rebase failed; aborting rebase and continuing CI."
              git rebase --abort || true
              break
            fi
          done

          if [[ "$pushed" != "true" ]]; then
            echo "setup.yaml push failed after retries, continuing CI."
            exit 0
          fi
      - name: Create reduced configs for CI sanity run
        if: steps.configcheck.outputs.has_configs == 'true'
        run: python scripts/create_sanity_configs.py

      - name: Install from setup.yaml and run reduced sanity configs
        if: steps.configcheck.outputs.has_configs == 'true'
        run: python scripts/run_setup_yaml_sanity.py

      - name: Run full notebook generation for all changed configs
        if: steps.configcheck.outputs.has_configs == 'true'
        run: python scripts/run_full_notebook_generation.py --skip-env-setup

      - name: Install gallery dependencies
        if: steps.configcheck.outputs.has_configs == 'true'
        run: python -m pip install --upgrade nbformat nbconvert

      - name: Build gallery from generated notebooks
        if: steps.configcheck.outputs.has_configs == 'true'
        run: python scripts/build_gallery.py --manifest out/notebook-manifest.json --output-dir docs-site

      - name: Commit and push generated notebooks and gallery
        if: success() && github.ref == 'refs/heads/dev-only-ci' && github.event_name != 'pull_request' && steps.configcheck.outputs.has_configs == 'true'
        run: |
          set +e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add out docs-site
          if git diff --cached --quiet; then
            echo "No generated output changes to commit."
            exit 0
          fi
          git commit -m "Update generated notebooks and gallery (dev-only-ci) [skip ci]"
          commit_rc=$?
          if [[ $commit_rc -ne 0 ]]; then
            echo "Generated output commit skipped/failed (rc=$commit_rc), continuing CI."
            exit 0
          fi

          branch_name="${GITHUB_REF#refs/heads/}"
          pushed="false"
          for attempt in 1 2 3; do
            if git push; then
              pushed="true"
              break
            fi
            echo "Generated output push failed on attempt $attempt, rebasing on origin/$branch_name and retrying..."
            git fetch origin "$branch_name"
            if ! git rebase "origin/$branch_name"; then
              echo "Generated output rebase failed; aborting rebase and continuing CI."
              git rebase --abort || true
              break
            fi
          done

          if [[ "$pushed" != "true" ]]; then
            echo "Generated output push failed after retries, continuing CI."
            exit 0
          fi

      - name: No config change skip notice
        if: steps.configcheck.outputs.has_configs != 'true'
        run: echo "No config changes detected. Skipping setup and notebook generation."

      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-only-ci-artifacts
          path: |
            out/
            docs-site/
  pages-preview:
    needs: ci-direct-execution
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install gallery rendering dependencies
        run: python -m pip install --upgrade nbformat nbconvert

      - name: Build basic gallery page
        run: python scripts/build_gallery.py --manifest out/notebook-manifest.json --output-dir docs-site

      - name: Upload pages preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: proposal-prototype-pages-preview
          path: docs-site/