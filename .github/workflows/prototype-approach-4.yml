name: approach-4-incremental-config-pipeline

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

defaults:
  run:
    shell: bash -l {0}

permissions:
  contents: write

jobs:
  detect-and-sanity:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: tardis-gsoc-approach-4-ci
          environment-file: envs/ci-environment.yml
          auto-activate-base: false

      - name: Resolve diff refs
        id: diffrefs
        run: |
          # if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          #   echo "base_ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          #   echo "head_ref=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "base_ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "head_ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base_ref=origin/main" >> "$GITHUB_OUTPUT"
            echo "head_ref=HEAD" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect changed configs
        run: |
          python scripts/detect_changed_configs.py \
            --base-ref "${{ steps.diffrefs.outputs.base_ref }}" \
            --head-ref "${{ steps.diffrefs.outputs.head_ref }}" \
            --output generated/changed-configs.json

      - name: Generate per-config setup.yaml
        run: python scripts/generate_setup_yamls.py

      - name: Commit and push generated setup.yaml files
        if: success() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          manifest = Path("generated/setup-generation-manifest.json")
          if not manifest.exists():
              raise SystemExit(0)

          rows = json.loads(manifest.read_text(encoding="utf-8"))
          paths = sorted({row.get("setup_yaml", "") for row in rows if row.get("setup_yaml")})
          if not paths:
              raise SystemExit(0)

          subprocess.run(["git", "add", *paths], check=False)
          PY
          if git diff --cached --quiet; then
            echo "No setup.yaml changes to commit."
            exit 0
          fi
          git commit -m "Update generated setup.yaml files [skip ci]"
          git push

      - name: Create reduced configs for CI sanity run
        run: python scripts/create_sanity_configs.py

      - name: Install from setup.yaml and run reduced sanity configs
        run: python scripts/run_setup_yaml_sanity.py

      - name: Create server queue payload
        if: success()
        run: python scripts/create_server_queue.py

      - name: Check if server queue has work
        if: success()
        id: queuecheck
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          queue_path = Path("generated/server-queue.json")
          rows = json.loads(queue_path.read_text(encoding="utf-8")) if queue_path.exists() else []
          has_work = "true" if len(rows) > 0 else "false"
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"has_work={has_work}\n")
          print(f"Queue entries: {len(rows)}")
          PY

      - name: Check Azure dispatch prerequisites
        if: success()
        id: dispatchcheck
        env:
          AZURE_SERVER_HOST: ${{ secrets.AZURE_SERVER_HOST }}
          AZURE_SERVER_USER: ${{ secrets.AZURE_SERVER_USER }}
          AZURE_SSH_PRIVATE_KEY: ${{ secrets.AZURE_SSH_PRIVATE_KEY }}
          AZURE_SERVER_REPO_PATH: ${{ secrets.AZURE_SERVER_REPO_PATH }}
        run: |
          missing=()
          [[ -n "$AZURE_SERVER_HOST" ]] || missing+=("AZURE_SERVER_HOST")
          [[ -n "$AZURE_SERVER_USER" ]] || missing+=("AZURE_SERVER_USER")
          [[ -n "$AZURE_SSH_PRIVATE_KEY" ]] || missing+=("AZURE_SSH_PRIVATE_KEY")
          [[ -n "$AZURE_SERVER_REPO_PATH" ]] || missing+=("AZURE_SERVER_REPO_PATH")

          if [[ "${#missing[@]}" -eq 0 ]]; then
            echo "dispatch_ready=true" >> "$GITHUB_OUTPUT"
            echo "missing_secrets=" >> "$GITHUB_OUTPUT"
          else
            echo "dispatch_ready=false" >> "$GITHUB_OUTPUT"
            echo "missing_secrets=${missing[*]}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: approach-4-ci-artifacts
          path: |
            generated/changed-configs.json
            generated/setup-generation-manifest.json
            generated/sanity-manifest.json
            generated/sanity-results.json
            generated/server-queue.json

      - name: Configure SSH for Azure dispatch
        if: success() && steps.queuecheck.outputs.has_work == 'true' && steps.dispatchcheck.outputs.dispatch_ready == 'true'
        env:
          AZURE_SERVER_HOST: ${{ secrets.AZURE_SERVER_HOST }}
          AZURE_SERVER_USER: ${{ secrets.AZURE_SERVER_USER }}
          AZURE_SSH_PRIVATE_KEY: ${{ secrets.AZURE_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$AZURE_SSH_PRIVATE_KEY" > ~/.ssh/azure_key
          chmod 600 ~/.ssh/azure_key
          ssh-keyscan -H "$AZURE_SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Dispatch queue to Azure server
        if: success() && steps.queuecheck.outputs.has_work == 'true' && steps.dispatchcheck.outputs.dispatch_ready == 'true'
        env:
          AZURE_SERVER_HOST: ${{ secrets.AZURE_SERVER_HOST }}
          AZURE_SERVER_USER: ${{ secrets.AZURE_SERVER_USER }}
          AZURE_SERVER_REPO_PATH: ${{ secrets.AZURE_SERVER_REPO_PATH }}
        run: |
          DISPATCH_REF="$(git rev-parse HEAD)"
          ssh -i ~/.ssh/azure_key "$AZURE_SERVER_USER@$AZURE_SERVER_HOST" "mkdir -p '$AZURE_SERVER_REPO_PATH/generated'"
          scp -i ~/.ssh/azure_key generated/server-queue.json "$AZURE_SERVER_USER@$AZURE_SERVER_HOST:$AZURE_SERVER_REPO_PATH/generated/server-queue.json"
          ssh -i ~/.ssh/azure_key "$AZURE_SERVER_USER@$AZURE_SERVER_HOST" "cd '$AZURE_SERVER_REPO_PATH' && TARGET_REF='$DISPATCH_REF' bash server/run_on_azure_example.sh"

      - name: Pull generated notebooks and gallery from Azure server
        if: success() && steps.queuecheck.outputs.has_work == 'true' && steps.dispatchcheck.outputs.dispatch_ready == 'true'
        env:
          AZURE_SERVER_HOST: ${{ secrets.AZURE_SERVER_HOST }}
          AZURE_SERVER_USER: ${{ secrets.AZURE_SERVER_USER }}
          AZURE_SERVER_REPO_PATH: ${{ secrets.AZURE_SERVER_REPO_PATH }}
        run: |
          mkdir -p out docs-site
          scp -i ~/.ssh/azure_key -r "$AZURE_SERVER_USER@$AZURE_SERVER_HOST:$AZURE_SERVER_REPO_PATH/out/." out/
          scp -i ~/.ssh/azure_key -r "$AZURE_SERVER_USER@$AZURE_SERVER_HOST:$AZURE_SERVER_REPO_PATH/docs-site/." docs-site/

      - name: Commit and push generated notebooks and gallery
        if: success() && steps.queuecheck.outputs.has_work == 'true' && steps.dispatchcheck.outputs.dispatch_ready == 'true' && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add out docs-site
          if git diff --cached --quiet; then
            echo "No generated output changes to commit."
            exit 0
          fi
          git commit -m "Update generated notebooks and gallery [skip ci]"
          git push

      - name: Server dispatch skipped notice
        if: success() && (steps.queuecheck.outputs.has_work != 'true' || steps.dispatchcheck.outputs.dispatch_ready != 'true')
        run: |
          if [[ "${{ steps.queuecheck.outputs.has_work }}" != "true" ]]; then
            echo "Azure dispatch skipped: queue is empty."
          else
            echo "Azure dispatch skipped: missing required secrets: ${{ steps.dispatchcheck.outputs.missing_secrets }}"
          fi

  pages-preview:
    needs: detect-and-sanity
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install gallery rendering dependencies
        run: python -m pip install --upgrade nbformat nbconvert

      - name: Build basic gallery page
        run: python scripts/build_gallery.py --manifest out/notebook-manifest.json --output-dir docs-site

      - name: Upload pages preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: approach-4-pages-preview
          path: docs-site/
