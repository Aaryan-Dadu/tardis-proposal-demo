# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  workflow_run:
    workflows: ["tardis-proposal-prototype-incremental-pipeline"]
    branches: ["main"]
    types: [completed]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install gallery dependencies
        run: python -m pip install --upgrade nbformat nbconvert

      - name: Build gallery page
        run: python scripts/build_gallery.py --manifest out/notebook-manifest.json --output-dir docs-site

      - name: Ensure docs-site exists
        run: |
          mkdir -p docs-site
          if [[ ! -f docs-site/index.html ]]; then
            cat > docs-site/index.html <<'HTML'
          <!doctype html>
          <html><head><meta charset="utf-8"><title>TARDIS Gallery</title></head>
          <body><h1>TARDIS Gallery</h1><p>No gallery output available yet.</p></body></html>
          HTML
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          # Upload entire repository
          path: './docs-site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
