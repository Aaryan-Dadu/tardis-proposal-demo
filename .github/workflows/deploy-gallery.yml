name: deploy-approach-4-gallery

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install gallery dependencies
        run: python -m pip install --upgrade nbformat nbconvert

      - name: Build gallery page
        run: python scripts/build_gallery.py --manifest out/notebook-manifest.json --output-dir docs-site

      - name: Ensure docs-site exists
        run: |
          mkdir -p docs-site
          if [[ ! -f docs-site/index.html ]]; then
            cat > docs-site/index.html <<'HTML'
          <!doctype html>
          <html><head><meta charset="utf-8"><title>TARDIS Gallery</title></head>
          <body><h1>TARDIS Gallery</h1><p>No gallery output available yet.</p></body></html>
          HTML
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs-site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
