# TARDIS Proposal Prototype CI Environment
# Lightweight environment for orchestrating config detection, setup.yaml generation,
# and sanity checks on GitHub Actions.
# Per-config environments are created separately from tardisbase lockfiles.

name: tardis-proposal-prototype-ci
channels:
  - conda-forge
dependencies:
  # Python and core tools
  - python=3.13
  - pip
  
  # Essential for CI scripts
  - pyyaml>=6.0         # Parse setup.yaml and config files
  - git>=2.25           # Version control operations
  - gitpython>=3.1.0    # Python git library for programmatic git operations
  
  # Data handling
  - requests>=2.25      # Download lockfiles and resources
